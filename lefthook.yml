pre-commit:
  parallel: true
  commands:
    cargo-fmt:
      run: cargo fmt --manifest-path src-tauri/Cargo.toml --all
    typecheck:
      run: npx tsc --noEmit
    frontend-test:
      run: npm test

pre-push:
  parallel: false
  commands:
    cargo-check:
      run: cargo check --manifest-path src-tauri/Cargo.toml
