name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt,clippy

      - name: Install protobuf compiler
        # Must come after Rust install — installing brew packages first
        # leaves macos-latest's pre-installed cargo shim ahead of the
        # dtolnay-installed toolchain on PATH, breaking `cargo fmt`.
        run: brew install protobuf

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      # Cargo clippy disabled until pre-existing style nits get cleaned
      # up in a follow-up PR (e.g. `map_or(true, ...)` → `is_none_or`).
      # The previous reason ("can't fetch private cinchcli/relay") went
      # away with Phase 4 — all deps now resolve via crates.io.
      # TODO(infra): re-enable once the desktop tree is clippy-clean.
      #
      # - name: Cargo clippy
      #   run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
