name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      # Sibling-checkout invariant: src-tauri/Cargo.toml has a path dep on
      # ../../cinch/crates/client-core, and proto-cinch's build.rs reads
      # ../../../relay/proto. CI must mirror the developer's local layout.
      # TODO: switch the cinch/relay refs to `main` once the proto-source-of-truth
      # PR triple has merged. For now they must point at the matching feature
      # branches because main doesn't yet have the proto-cinch crate.
      - name: Checkout desktop
        uses: actions/checkout@v4
        with:
          path: desktop

      - name: Checkout cinch sibling
        uses: actions/checkout@v4
        with:
          repository: cinchcli/cinch
          ref: proto-source-of-truth
          path: cinch

      - name: Checkout relay sibling (needed for proto-cinch's build.rs)
        uses: actions/checkout@v4
        with:
          repository: cinchcli/relay
          ref: proto-source-of-truth
          path: relay

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml
