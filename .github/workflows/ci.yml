name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      # cargo clippy + cargo check require the cinch + relay sibling
      # checkouts (path-dep on client-core, proto-cinch's build.rs reads
      # relay/proto). The default GITHUB_TOKEN can't fetch the private
      # cinchcli/cinch + cinchcli/relay repos. Disabled until a PAT with
      # cross-repo read access is wired in via secrets, or the sibling
      # repos are made public.
      # TODO(infra): re-enable after cross-repo access is set up.
      #
      # - name: Cargo clippy
      #   run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      #
      # - name: Cargo check
      #   run: cargo check --manifest-path src-tauri/Cargo.toml
