name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate sibling pin files
        # Cheap format check on every PR. The full sibling-HEAD comparison
        # runs in desktop-release.yml after the relay clone. cinch is no
        # longer pinned this way — client-core ships as `cinchcli-core`
        # on crates.io and is locked via Cargo.lock.
        run: |
          for f in .relay-ref; do
            if [ ! -f "$f" ]; then
              echo "::error::missing pin file: $f" >&2
              exit 1
            fi
            ref=$(tr -d '[:space:]' < "$f")
            if [[ ! "$ref" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::$f must contain a 40-char git sha, got: '$ref'" >&2
              exit 1
            fi
            echo "$f = $ref"
          done

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt,clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      # cargo clippy + cargo check still need the relay sibling
      # checkout (cinchcli-core's build.rs reads relay/proto in this
      # interim phase via the wire-vector test path). The default
      # GITHUB_TOKEN can't fetch the private cinchcli/relay repo.
      # Disabled until a PAT with cross-repo read access is wired in,
      # the relay repo is made public, or Phase 4 lands and removes
      # the relay-sibling dependency entirely.
      # TODO(infra): re-enable after Phase 4.
      #
      # - name: Cargo clippy
      #   run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      #
      # - name: Cargo check
      #   run: cargo check --manifest-path src-tauri/Cargo.toml
